<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width">
<title>BMO Faces — V1 vs V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#eee;font-family:system-ui,-apple-system,sans-serif;padding:2rem}
h1{font-size:2rem;color:#98d8c8;margin-bottom:.3rem}
.sub{color:#888;margin-bottom:2rem}
.face-group{margin-bottom:3rem}
.face-group h2{font-size:1.3rem;margin-bottom:.3rem;color:#f3c86a}
.face-group .desc{color:#888;font-size:.85rem;margin-bottom:.8rem}
.compare{display:grid;grid-template-columns:1fr auto 1fr;gap:.8rem;align-items:center;background:#16213e;border-radius:12px;padding:1rem;border:1px solid #2a2a4a}
.compare img{width:100%;aspect-ratio:800/480;object-fit:cover;border-radius:8px;background:#98d8c8}
.compare .label{text-align:center;font-size:.8rem;color:#888;margin-top:.3rem}
.compare .vs{font-size:1.5rem;font-weight:700;color:#f3c86a;padding:0 1rem;text-align:center}
.multi-frame{display:flex;flex-direction:column;gap:.3rem}
.multi-frame .row{display:flex;gap:4px}
.multi-frame .row img{width:calc(20% - 4px)}
.anim-badge{display:inline-block;background:#f3c86a;color:#1a1a2e;font-size:.6rem;padding:1px 6px;border-radius:6px;margin-left:6px;font-weight:700}
@media(max-width:700px){.compare{grid-template-columns:1fr;gap:.5rem}.compare .vs{padding:.5rem 0}}
</style>
</head>
<body>

<h1>🤖 BMO Faces — V1 vs V2</h1>
<p class="sub">Originales (madrugada) ↔ Versiones corregidas con estilo BMO standard</p>

<div id="gallery"></div>

<script>
const FACES = [
  {
    name:"blink", frames:5, desc:"Parpadeo — ojos standard: círculos → línea+pupila → arcos ∩∩, boca sonrisa standard ∪",
    v1:"faces/blink", v2:"faces_v2/blink"
  },
  {
    name:"corazon", frames:4, desc:"Enamorado — ❤️ pixel 8-bit animado (late)",
    v1:"faces/corazon", v2:"faces_v2/corazon"
  },
  {
    name:"enojado", frames:1, desc:"Enojado — cejas angry standard \ / , boca INVERTIDA a frown ∩ (antes tenía sonrisa)",
    v1:"faces/enojado", v2:"faces_v2/enojado"
  },
  {
    name:"feliz", frames:1, desc:"Feliz — ojos arcos ∩∩, boca sonrisa ∪ standard, blush",
    v1:"faces/feliz", v2:"faces_v2/feliz"
  },
  {
    name:"shrek_cat", frames:1, desc:"Meme Shrek — ojos grandes con catchlight, boca frown ∩",
    v1:"faces/shrek_cat", v2:"faces_v2/shrek_cat"
  },
  {
    name:"sorprendido", frames:1, desc:"Sorprendido — ojos círculo+pupila, cejas levantadas, BOCA ABIERTA estilo speaking (óvalo + dientes + lengua)",
    v1:"faces/sorprendido", v2:"faces_v2/sorprendido"
  },
  {
    name:"sospechoso", frames:1, desc:"Sospechoso — ojo izquierdo abierto, derecho entrecerrado, cejas escépticas, media sonrisa",
    v1:"faces/sospechoso", v2:"faces_v2/sospechoso"
  },
];

const g = document.getElementById('gallery');

FACES.forEach(f => {
  const grp = document.createElement('div'); grp.className = 'face-group';
  const badge = f.frames > 1 ? `<span class="anim-badge">🎬 ${f.frames} frames</span>` : '';
  grp.innerHTML = `<h2>${f.name} ${badge}</h2><p class="desc">${f.desc}</p>`;

  if (f.frames > 1) {
    // Multi-frame: show all frames in a row for both versions
    const comp = document.createElement('div'); comp.className = 'compare';
    
    // V1 column
    const v1col = document.createElement('div');
    let v1html = '<div class="multi-frame">';
    for (let i = 1; i <= f.frames; i++) {
      v1html += `<img src="${f.v1}/${String(i).padStart(2,'0')}.png" alt="v1 frame ${i}" loading="lazy">`;
    }
    v1html += '</div><div class="label">⬅️ ORIGINAL (v1)</div>';
    v1col.innerHTML = v1html;
    comp.appendChild(v1col);
    
    // VS
    const vs = document.createElement('div'); vs.className = 'vs'; vs.textContent = '↔️';
    comp.appendChild(vs);
    
    // V2 column
    const v2col = document.createElement('div');
    let v2html = '<div class="multi-frame">';
    for (let i = 1; i <= f.frames; i++) {
      v2html += `<img src="${f.v2}/${String(i).padStart(2,'0')}.png" alt="v2 frame ${i}" loading="lazy">`;
    }
    v2html += '</div><div class="label">V2 (corregida) ➡️</div>';
    v2col.innerHTML = v2html;
    comp.appendChild(v2col);
    
    grp.appendChild(comp);
  } else {
    // Single frame: side by side
    const comp = document.createElement('div'); comp.className = 'compare';
    const n = String(1).padStart(2,'0');
    comp.innerHTML = `
      <div><img src="${f.v1}/${n}.png" alt="v1 ${f.name}"><div class="label">⬅️ ORIGINAL (v1)</div></div>
      <div class="vs">↔️</div>
      <div><img src="${f.v2}/${n}.png" alt="v2 ${f.name}"><div class="label">V2 (corregida) ➡️</div></div>
    `;
    grp.appendChild(comp);
  }
  
  g.appendChild(grp);
});
</script>
</body></html>
